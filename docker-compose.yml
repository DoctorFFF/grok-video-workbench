services:
  grok-video-workbench:
    build:
      context: .
    image: grok-video-workbench:latest
    container_name: grok-video-workbench
    restart: unless-stopped
    ports:
      - "${WORKBENCH_PORT:-7860}:7860"
    environment:
      PORT: "7860"
      WORKBENCH_DATA_DIR: /home/user/app/data
      WORKBENCH_VIDEOS_DIR: /home/user/app/videos
      WORKBENCH_AUTH_KEY: ${WORKBENCH_AUTH_KEY:?Set WORKBENCH_AUTH_KEY in .env}
      CPA_BASE_URL: ${CPA_BASE_URL:-}
      CPA_API_KEY: ${CPA_API_KEY:-}
      CPA_MANAGEMENT_KEY: ${CPA_MANAGEMENT_KEY:-}
      IMAGE_HOST_BASE_URL: ${IMAGE_HOST_BASE_URL:-https://img.remit.ee}
      IMAGE_HOST_SELECTED_URL: ${IMAGE_HOST_SELECTED_URL:-https://img.remit.ee}
      IMAGE_HOST_OPTIONS: ${IMAGE_HOST_OPTIONS:-https://img.remit.ee}
    volumes:
      - ./data:/home/user/app/data
      - ./videos:/home/user/app/videos
